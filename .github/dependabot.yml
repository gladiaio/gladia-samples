version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  # Python — uv workspaces
  - package-ecosystem: "uv"
    directory: "/python"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]

  # JavaScript / TypeScript — npm
  - package-ecosystem: "npm"
    directory: "/javascript"
    schedule:
      interval: "weekly"
    groups:
      javascript-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule:
      interval: "weekly"
    groups:
      typescript-deps:
        patterns: ["*"]
